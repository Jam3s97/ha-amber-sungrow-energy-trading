# /config/packages/energy_trading.yaml
# ==============================================================================
# 1. SETTINGS & INPUTS
# ==============================================================================
input_select:
  master_inverter_mode:
    name: Master Inverter Control
    options:
      - "Auto Mode"
      - "Excess Solar to Grid"
      - "Max Export (Dump)"
      - "Max Import (Grid Charge)"
      - "Self Consumption (Zero Export)"
      - "Storm Mode"
    icon: mdi:solar-power-variant

input_boolean:
  auto_zero_export_negative_fit:
    name: Auto Mode - Zero Export on Negative FiT
    icon: mdi:solar-panel-large

  auto_grid_charge_negative_buy:
    name: Auto Mode - Grid Charge on Negative Buy Price
    icon: mdi:battery-charging-100

input_number:
  fil_amber_dump_tier1_cents:
    name: Tier 1 - Trigger Dump FiT
    min: -20
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "¢"
    icon: mdi:cash

  auto_dump_min_soc_tier1:
    name: Tier 1 - Stop Dumping at SoC
    min: 0
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-arrow-down

  fil_amber_dump_tier2_cents:
    name: Tier 2 - Trigger Dump FiT
    min: -20
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "¢"
    icon: mdi:cash-multiple

  auto_dump_min_soc_tier2:
    name: Tier 2 - Stop Dumping at SoC
    min: 0
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-arrow-down

  fil_amber_dump_tier3_cents:
    name: Tier 3 - Trigger Dump FiT
    min: -20
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "¢"
    icon: mdi:cash-fast

  auto_dump_min_soc_tier3:
    name: Tier 3 - Stop Dumping at SoC
    min: 0
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-arrow-down

# Added DNSP export limit input number as my invertor has higher capactiy than my approved DNSP export limt.
# I wanted to pull inverter rated output for max but input_number doesn't support templates anywhere in its config.
# Max set to 10,000 adjust if necessary
  grid_export_dnsp_limit:
    name: Grid Export DNSP Limit
    min: 0
    max: 10000
    step: 100
    mode: slider
    unit_of_measurement: "W"
    icon: mdi:transmission-tower-export

# For battery charge target tracking
input_datetime:
  house_battery_target_full_time:
    name: "House: Battery Target Full Time"
    has_time: true
    initial: "16:30:00"

# ==============================================================================
# 2. TEMPLATES
# ==============================================================================
template:
  - sensor:
      # -----------------------------------------------------------------------
      # BATTERY REQUIRED CHARGE POWER (W)
      # Charge rate needed RIGHT NOW to reach 100% SoC by the target time.
      # Returns -1 if data is unavailable, 0 if battery is already full
      # or target time has passed.
      # -----------------------------------------------------------------------
      - name: "Battery Required Charge Power"
        unique_id: battery_required_charge_power
        unit_of_measurement: "W"
        icon: mdi:battery-clock
        state: >
          {% set soc = states('sensor.battery_level') | float(-1) %}
          {% set capacity_kwh = states('sensor.battery_capacity_high_precision') | float(0) %}
          {% set target_str = states('input_datetime.house_battery_target_full_time') %}
          {% if soc < 0 or capacity_kwh == 0 or target_str in ['unknown', 'unavailable'] %}
            -1
          {% else %}
            {% set energy_needed_kwh = capacity_kwh * ([0, 100 - soc] | max) / 100 %}
            {% set t = target_str.split(':') %}
            {% set target_dt = now().replace(hour=t[0]|int, minute=t[1]|int, second=0, microsecond=0) %}
            {% set hours_left = (target_dt - now()).total_seconds() / 3600 %}
            {% if hours_left <= 0 or soc >= 99 %}
              0
            {% else %}
              {{ (energy_needed_kwh / hours_left * 1000) | round(0) }}
            {% endif %}
          {% endif %}

      # -----------------------------------------------------------------------
      # BATTERY ON TRACK FOR TARGET
      # Compares current battery charge rate to required rate.
      # Used as the gate for forecast alert notifications.
      # -----------------------------------------------------------------------
      - name: "Battery On Track for Target"
        unique_id: battery_on_track_for_target
        icon: mdi:battery-check
        state: >
          {% set required = states('sensor.battery_required_charge_power') | float(-1) %}
          {% set batt_power = states('sensor.battery_charging_power_signed') | float(0) %}
          {% set soc = states('sensor.battery_level') | float(100) %}
          {% if required < 0 %}
            unknown
          {% elif required == 0 or soc >= 99 %}
            true
          {% else %}
            {{ batt_power >= required }}
          {% endif %}

# ==============================================================================
# 3. SCRIPTS
# Each script only writes a register if the current value differs.
# This prevents redundant modbus writes hammering the Inverter.
# ==============================================================================
script:

  # ----------------------------------------------------------------------------
  # Forced Discharge: Forced mode + discharge at max power + DNSP export limit
  # Used by: Max Export (Dump), Auto Tier 1/2/3
  # ----------------------------------------------------------------------------
  sungrow_set_forced_discharge:
    alias: "Sungrow: Set Forced Discharge"
    icon: mdi:battery-arrow-up
    sequence:
      - if:
          - "{{ states('select.ems_mode') != 'Forced mode' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.ems_mode
            data:
              option: "Forced mode"
      - if:
          - "{{ states('select.battery_forced_charge_discharge') != 'Forced discharge' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.battery_forced_charge_discharge
            data:
              option: "Forced discharge"
      - variables:
          max_discharge: "{{ state_attr('number.battery_forced_charge_discharge_power', 'max') | default(10000) }}"
          max_bat_discharge: "{{ state_attr('number.battery_max_discharge_power', 'max') | default(10000) }}"
          dnsp_limit: "{{ states('input_number.grid_export_dnsp_limit') | float }}"
      - if:
          - "{{ states('number.battery_forced_charge_discharge_power') | float != max_discharge }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.battery_forced_charge_discharge_power
            data:
              value: "{{ max_discharge }}"
      - if:
          - "{{ states('number.battery_max_discharge_power') | float != max_bat_discharge }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.battery_max_discharge_power
            data:
              value: "{{ max_bat_discharge }}"
      - if:
          - "{{ states('switch.export_power_limit') != 'on' }}"
        then:
          - action: switch.turn_on
            target:
              entity_id: switch.export_power_limit
      - if:
          - "{{ states('number.export_power_limit') | float != dnsp_limit }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.export_power_limit
            data:
              value: "{{ dnsp_limit }}"

  # ----------------------------------------------------------------------------
  # Forced Charge: Forced mode + charge at max power + DNSP export limit
  # Used by: Max Import (Grid Charge), Auto P4 (negative buy price)
  # ----------------------------------------------------------------------------
  sungrow_set_forced_charge:
    alias: "Sungrow: Set Forced Charge"
    icon: mdi:battery-charging-100
    sequence:
      - if:
          - "{{ states('select.ems_mode') != 'Forced mode' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.ems_mode
            data:
              option: "Forced mode"
      - if:
          - "{{ states('select.battery_forced_charge_discharge') != 'Forced charge' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.battery_forced_charge_discharge
            data:
              option: "Forced charge"
      - variables:
          max_charge: "{{ state_attr('number.battery_forced_charge_discharge_power', 'max') | default(10000) }}"
          max_bat_charge: "{{ state_attr('number.battery_max_charge_power', 'max') | default(10000) }}"
          dnsp_limit: "{{ states('input_number.grid_export_dnsp_limit') | float }}"
      - if:
          - "{{ states('number.battery_forced_charge_discharge_power') | float != max_charge }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.battery_forced_charge_discharge_power
            data:
              value: "{{ max_charge }}"
      - if:
          - "{{ states('number.battery_max_charge_power') | float != max_bat_charge }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.battery_max_charge_power
            data:
              value: "{{ max_bat_charge }}"
      - if:
          - "{{ states('switch.export_power_limit') != 'on' }}"
        then:
          - action: switch.turn_on
            target:
              entity_id: switch.export_power_limit
      - if:
          - "{{ states('number.export_power_limit') | float != dnsp_limit }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.export_power_limit
            data:
              value: "{{ dnsp_limit }}"

  # ----------------------------------------------------------------------------
  # Self-Consumption + Export: Normal solar-first, export excess up to DNSP limit
  # Used by: Excess Solar to Grid, Auto default fallback
  # ----------------------------------------------------------------------------
  sungrow_set_self_consumption_export:
    alias: "Sungrow: Set Self-Consumption + Export"
    icon: mdi:solar-power-variant
    sequence:
      - if:
          - "{{ states('select.ems_mode') != 'Self-consumption mode (default)' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.ems_mode
            data:
              option: "Self-consumption mode (default)"
      - if:
          - "{{ states('select.battery_forced_charge_discharge') != 'Stop (default)' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.battery_forced_charge_discharge
            data:
              option: "Stop (default)"
      - variables:
          max_bat_discharge: "{{ state_attr('number.battery_max_discharge_power', 'max') | default(10000) }}"
          dnsp_limit: "{{ states('input_number.grid_export_dnsp_limit') | float }}"
      - if:
          - "{{ states('number.battery_max_discharge_power') | float != max_bat_discharge }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.battery_max_discharge_power
            data:
              value: "{{ max_bat_discharge }}"
      - if:
          - "{{ states('number.battery_reserved_soc_for_backup') | int != 10 }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.battery_reserved_soc_for_backup
            data:
              value: 10
              entity_id: switch.export_power_limit
      - if:
          - "{{ states('number.export_power_limit') | float != dnsp_limit }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.export_power_limit
            data:
              value: "{{ dnsp_limit }}"

  # ----------------------------------------------------------------------------
  # Self-Consumption + Zero Export: Blocks all export to grid
  # Used by: Self Consumption (Zero Export), Auto P5 (negative FiT)
  # export_limit_watts: pass 0 for hard zero, or 100 for soft near-zero (neg FiT)
  # ----------------------------------------------------------------------------
  sungrow_set_self_consumption_zero_export:
    alias: "Sungrow: Set Self-Consumption Zero Export"
    icon: mdi:transmission-tower-off
    fields:
      export_limit_watts:
        description: "Export limit in watts (0 = hard zero, 100 = soft near-zero)"
        default: 0
        selector:
          number:
            min: 0
            max: 500
            unit_of_measurement: W
    sequence:
      - if:
          - "{{ states('select.ems_mode') != 'Self-consumption mode (default)' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.ems_mode
            data:
              option: "Self-consumption mode (default)"
      - if:
          - "{{ states('select.battery_forced_charge_discharge') != 'Stop (default)' }}"
        then:
          - action: select.select_option
            target:
              entity_id: select.battery_forced_charge_discharge
            data:
              option: "Stop (default)"
      - variables:
          max_bat_discharge: "{{ state_attr('number.battery_max_discharge_power', 'max') | default(10000) }}"
      - if:
          - "{{ states('number.battery_max_discharge_power') | float != max_bat_discharge }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.battery_max_discharge_power
            data:
              value: "{{ max_bat_discharge }}"
      - if:
          - "{{ states('switch.export_power_limit') != 'on' }}"
        then:
          - action: switch.turn_on
            target:
              entity_id: switch.export_power_limit
      - if:
          - "{{ states('number.export_power_limit') | float != export_limit_watts | float }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.export_power_limit
            data:
              value: "{{ export_limit_watts }}"

# ==============================================================================
# 4. AUTOMATIONS
# ==============================================================================
automation:

  # ----------------------------------------------------------------------------
  # AUTOMATION: Master Inverter Control
  # ----------------------------------------------------------------------------
  - id: "automation_master_inverter_control"
    alias: "Master Inverter Control Automation"
    description: "Controls inverter behaviour from a single dropdown (Manual Overrides)"
    triggers:
      - trigger: state
        entity_id: input_select.master_inverter_mode
    actions:
      - choose:
          # Standard normal operation. Solar powers house -> charges battery -> exports excess.
          - conditions:
              - condition: state
                entity_id: input_select.master_inverter_mode
                state: "Excess Solar to Grid"
            sequence:
              - action: script.sungrow_set_self_consumption_export

          # Dumps battery to grid at max capacity.
          - conditions:
              - condition: state
                entity_id: input_select.master_inverter_mode
                state: "Max Export (Dump)"
            sequence:
              - action: script.sungrow_set_forced_discharge

          - conditions:
              - condition: state
                entity_id: input_select.master_inverter_mode
                state: "Max Import (Grid Charge)"
            sequence:
              - action: script.sungrow_set_forced_charge

          - conditions:
              - condition: state
                entity_id: input_select.master_inverter_mode
                state: "Self Consumption (Zero Export)"
            sequence:
              - action: script.sungrow_set_self_consumption_zero_export
                data:
                  export_limit_watts: 0

          # Storm Mode: forced charge + lock backup reserve at 100%
          - conditions:
              - condition: state
                entity_id: input_select.master_inverter_mode
                state: "Storm Mode"
            sequence:
              - action: script.sungrow_set_forced_charge
              - if:
                  - "{{ states('number.battery_reserved_soc_for_backup') | int != 100 }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.battery_reserved_soc_for_backup
                    data:
                      value: 100

  # ----------------------------------------------------------------------------
  # AUTOMATION: Amber Trading Auto Mode
  # ----------------------------------------------------------------------------
  - id: "automation_amber_auto_mode"
    alias: "Amber Trading Auto Mode"
    description: "Evaluates Amber pricing and SoC to dynamically control inverter when in Auto Mode"
    mode: queued
    triggers:
      - trigger: state
        entity_id: sensor.amber_express_home_feed_in_price
      - trigger: state
        entity_id: sensor.amber_express_home_general_price
      - trigger: state
        entity_id: sensor.battery_level
      - trigger: state
        entity_id: input_select.master_inverter_mode
        to: "Auto Mode"
      - trigger: state
        entity_id: input_number.fil_amber_dump_tier1_cents
      - trigger: state
        entity_id: input_number.auto_dump_min_soc_tier1
      - trigger: state
        entity_id: input_number.fil_amber_dump_tier2_cents
      - trigger: state
        entity_id: input_number.auto_dump_min_soc_tier2
      - trigger: state
        entity_id: input_number.fil_amber_dump_tier3_cents
      - trigger: state
        entity_id: input_number.auto_dump_min_soc_tier3
      - trigger: state
        entity_id: input_boolean.auto_zero_export_negative_fit
      - trigger: state
        entity_id: input_boolean.auto_grid_charge_negative_buy
    conditions:
      - condition: state
        entity_id: input_select.master_inverter_mode
        state: "Auto Mode"
    actions:
      - variables:
          price: "{{ states('sensor.amber_express_home_feed_in_price') | float(0) }}"
          buy_price: "{{ states('sensor.amber_express_home_general_price') | float(0) }}"
          price_is_estimate: "{{ state_attr('sensor.amber_express_home_feed_in_price', 'estimate') }}"
          buy_price_is_estimate: "{{ state_attr('sensor.amber_express_home_general_price', 'estimate') }}"
          soc: "{{ states('sensor.battery_level') | int(0) }}"
          # Divide whole cents by 100 to compare against Amber's dollar amounts
          t3_price: "{{ states('input_number.fil_amber_dump_tier3_cents') | float(0) / 100 }}"
          t3_soc: "{{ states('input_number.auto_dump_min_soc_tier3') | int(0) }}"
          t2_price: "{{ states('input_number.fil_amber_dump_tier2_cents') | float(0) / 100 }}"
          t2_soc: "{{ states('input_number.auto_dump_min_soc_tier2') | int(0) }}"
          t1_price: "{{ states('input_number.fil_amber_dump_tier1_cents') | float(0) / 100 }}"
          t1_soc: "{{ states('input_number.auto_dump_min_soc_tier1') | int(0) }}"

      - choose:
          # Priority 1: Dump Condition Met (Tier 3 - Extreme Spike)
          - conditions:
              - condition: template
                value_template: "{{ price >= t3_price and soc > t3_soc }}"
            sequence:
              - action: script.sungrow_set_forced_discharge

          # Priority 2: Dump Condition Met (Tier 2 - Medium Spike)
          - conditions:
              - condition: template
                value_template: "{{ price >= t2_price and soc > t2_soc }}"
            sequence:
              - action: script.sungrow_set_forced_discharge

          # Priority 3: Dump Condition Met (Tier 1 - Low Spike)
          - conditions:
              - condition: template
                value_template: "{{ price >= t1_price and soc > t1_soc }}"
            sequence:
              - action: script.sungrow_set_forced_discharge

          # Priority 4: Negative Buy Price (Get Paid to Charge)
          - conditions:
              - condition: state
                entity_id: input_boolean.auto_grid_charge_negative_buy
                state: "on"
              - condition: numeric_state
                entity_id: sensor.amber_express_home_general_price
                below: 0
              - condition: template
                value_template: "{{ buy_price_is_estimate == false }}"
            sequence:
              - action: script.sungrow_set_forced_charge

          # Priority 5: Negative FiT condition met (Stop Export)
          - conditions:
              - condition: state
                entity_id: input_boolean.auto_zero_export_negative_fit
                state: "on"
              - condition: numeric_state
                entity_id: sensor.amber_express_home_feed_in_price
                below: 0
            sequence:
              - action: script.sungrow_set_self_consumption_zero_export
                data:
                  export_limit_watts: 100

        # Default Auto Fallback: Normal self-consumption & export excess
        default:
          - action: script.sungrow_set_self_consumption_export

  # ----------------------------------------------------------------------------
  # AUTOMATION: Battery SoC Forecast Alert
  #
  # Checks every 15 minutes whether the battery is on track to reach 100% SoC
  # by house_battery_target_full_time (default 16:30).
  #
  # Only fires when:
  #   - Within 6 hours of the target time (and before it passes)
  #   - Battery is not on track (sensor.battery_on_track_for_target == false)
  #   - Battery is not already essentially full (< 99%)
  #
  # SUBSTITUTE: notify.mobile_app_pixel_8_pro → your notification target
  #             (e.g. notify.mobile_app_your_phone)
  # ----------------------------------------------------------------------------
  - alias: "House: Battery SoC Forecast Alert"
    id: house_battery_soc_forecast_alert
    description: "Alerts if battery will not reach 100% SoC by the target time"
    triggers:
      - trigger: time_pattern
        minutes: "/15"
    conditions:
      # Only alert in the window leading up to the target time
      - condition: template
        value_template: >
          {% set target_str = states('input_datetime.house_battery_target_full_time') %}
          {% if target_str in ['unknown', 'unavailable'] %}
            false
          {% else %}
            {% set t = target_str.split(':') %}
            {% set target_dt = now().replace(hour=t[0]|int, minute=t[1]|int, second=0, microsecond=0) %}
            {% set hours_left = (target_dt - now()).total_seconds() / 3600 %}
            {{ 0 < hours_left <= 6 }}
          {% endif %}
      # Battery is falling behind
      - condition: template
        value_template: "{{ states('sensor.battery_on_track_for_target') == 'false' }}"
      # Battery is not already full
      - condition: template
        value_template: "{{ states('sensor.battery_level') | float(100) < 97 }}"
    actions:
      - service: notify.mobile_app_pixel_8_pro
        data:
          title: "⚠️ Battery Won't Reach 100% in Time"
          message: >
            Battery is at {{ states('sensor.battery_level') | round(1) }}%.
            Needs {{ states('sensor.battery_required_charge_power') }}W to reach 100%
            by {{ states('input_datetime.house_battery_target_full_time') }}.
            Currently charging at
            {{ [0, states('sensor.battery_charging_power_signed') | int] | max }}W.
            Consider enabling grid charge or reducing load.
